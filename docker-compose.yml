version: '3.9'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rss-feed-api
    command: npm run start:dev
    environment:
      APP_ROLE: api
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: rss_user
      DB_PASSWORD: rss_password
      DB_NAME: rss_db
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      - postgres
      - redis

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rss-feed-worker
    command: npm run start:worker
    environment:
      APP_ROLE: worker
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: rss_user
      DB_PASSWORD: rss_password
      DB_NAME: rss_db
      REDIS_HOST: redis
      REDIS_PORT: 6379
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_USER: rss_user
      POSTGRES_PASSWORD: rss_password
      POSTGRES_DB: rss_db
    ports:
      - '5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis-data:/data

volumes:
  postgres-data:
  redis-data:
